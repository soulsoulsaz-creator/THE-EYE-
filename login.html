<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THE EYE - Agent Login</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#05080f;
font-family:Consolas,monospace;
color:#7bd3ff;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
width:90%;
max-width:650px;
background:#0b1320;
border:2px solid #3aa6ff;
padding:40px;
text-align:center;
box-shadow:0 0 30px rgba(58,166,255,.25);
}

h1{
font-size:42px;
letter-spacing:6px;
margin-bottom:20px;
}

p{
margin:12px 0;
color:#cfe8ff;
}

input{
width:100%;
padding:15px;
margin-top:25px;
background:#07101a;
border:1px solid #3aa6ff;
color:white;
font-size:18px;
text-align:center;
outline:none;
}

button{
width:100%;
padding:15px;
margin-top:20px;
background:#3aa6ff;
color:white;
border:none;
font-size:18px;
cursor:pointer;
}

button:hover{
background:#2589db;
}

#warning{
margin-top:20px;
height:25px;
color:#ff7070;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h1>THE EYE</h1>

<p>Agent Authentication Required</p>

<p>Enter your investigator name.</p>

<input
id="agent"
type="text"
placeholder="AGENT NAME">

<button onclick="continueLogin()">
ENTER HEADQUARTERS
</button>

<div id="warning"></div>

</div>

<script>

function continueLogin(){

let name=document.getElementById("agent").value.trim();

if(name===""){

document.getElementById("warning").innerHTML="ENTER YOUR NAME";

return;

}

localStorage.setItem("agentName",name);

window.location.href="dashboard.html";

}

</script>

</body>
</html>
